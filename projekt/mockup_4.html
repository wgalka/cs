<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Śledzenie Zamówienia</title>
    <style>
        :root { --primary: #2ed573; --bg: #f1f2f6; --surface: #ffffff; --text: #2f3542; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 40px 20px; color: var(--text); }
        .container { background: var(--surface); width: 100%; max-width: 450px; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .map { height: 250px; background: #dfe4ea; position: relative; display: flex; justify-content: center; align-items: center; font-size: 50px; }
        .marker { position: absolute; font-size: 30px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .content { padding: 30px; }
        .status { text-align: center; margin-bottom: 30px; }
        .time { font-size: 36px; font-weight: 800; color: var(--primary); margin: 0; }
        .desc { font-size: 16px; color: #747d8c; margin: 5px 0 0; }
        .progress { display: flex; justify-content: space-between; position: relative; margin-top: 20px; }
        .progress::before { content: ''; position: absolute; top: 12px; left: 0; right: 0; height: 3px; background: #f1f2f6; z-index: 1; }
        .progress-bar { position: absolute; top: 12px; left: 0; width: 66%; height: 3px; background: var(--primary); z-index: 2; transition: width 1s ease-in-out; }
        .step { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .dot { width: 26px; height: 26px; border-radius: 50%; background: #f1f2f6; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; }
        .step.active .dot, .step.done .dot { background: var(--primary); color: white; }
        .step.active .dot { box-shadow: 0 0 0 4px rgba(46, 213, 115, 0.2); }
        .step-label { font-size: 12px; color: #747d8c; }
        .step.active .step-label { color: var(--text); font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="map">
            🗺️ <div class="marker" style="top:40%; left:50%">🛵</div>
        </div>
        <div class="content">
            <div class="status">
                <h2 class="time">15 min</h2>
                <p class="desc">Szacowany czas dostawy</p>
            </div>
            <div class="progress">
                <div class="progress-bar"></div>
                <div class="step done"><div class="dot">✓</div><span class="step-label">Przyjęte</span></div>
                <div class="step done"><div class="dot">✓</div><span class="step-label">W kuchni</span></div>
                <div class="step active"><div class="dot">🛵</div><span class="step-label">W drodze</span></div>
                <div class="step"><div class="dot">4</div><span class="step-label">Dostarczone</span></div>
            </div>
        </div>
    </div>
</body>
</html>
